# Render無料プランのスリープ（15分アイドルで停止→起動に30秒以上）を防ぐための定期ping。
# 注意: GitHub Actionsのschedule実行は、特に10分間隔のような短い周期だと負荷状況により
# 大幅に遅延・間引かれることがあり（実測で数十分〜3時間以上あいた例あり）、
# このワークフローだけではスリープ防止として不十分。UptimeRobot等の外部監視サービスを
# 主とし、これは保険として残している
# 注意: リポジトリに60日間コミットがないとGitHubがスケジュール実行を自動停止する
name: keepalive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping production
        run: curl -fsS --max-time 60 --retry 2 https://genba-tracker.onrender.com/api/genba/ping
