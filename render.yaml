services:
  - name: genba-tracker
    type: web
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node .output/server/index.mjs
    healthCheckPath: /genba
    envVars:
      - key: NODE_ENV
        value: production
      - key: NITRO_PRESET
        value: node-server
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: GENBA_ADMIN_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL_BASE
        sync: false
